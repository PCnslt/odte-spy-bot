name: daily-retrain

on:
  schedule:
    - cron: "0 21 * * 1-5"   # 21:00 UTC on weekdays (~after US market close)
  workflow_dispatch:

# NOTE: This retrains on whatever data the runner can fetch (free yfinance, ~30 days). It commits
# an updated model ONLY if it validates better (trainer.py --retrain gate). For real use, point
# the data layer at a paid feed with proper history.
jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download data
        run: python -m src.data.data_pipeline --download --days 30
      - name: Retrain (only replaces model if better)
        run: python -m src.learning.trainer --retrain --no-download
      - name: Commit updated model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f models/ || true
          git commit -m "auto-retrain $(date -u +%Y-%m-%d)" || echo "no changes"
          git push || echo "nothing to push"
