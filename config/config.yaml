# Main configuration. Env vars (.env) override secrets; CLI flags override modes.

symbol: SPY
timezone: America/New_York

data:
  # Real data only. Backtests pull real SPY + real 0DTE option bars from Polygon.
  # The live loop pulls real-time SPY + option quotes from IBKR (TWS/Gateway).
  historical_provider: polygon   # SPY underlying + option history for backtests
  live_provider: ibkr            # real-time SPY + option quotes for the live loop
  interval: 1m
  cache_dir: data
  vix_symbol: "I:VIX1D"          # Polygon index ticker for the 1-day VIX (0DTE-relevant)
  polygon:
    base_url: "https://api.polygon.io"
    rate_limit_per_min: 60       # your plan rate-limits; client self-throttles + backs off on 429
    use_quotes: false            # true = fill on real NBBO bid/ask (needs quotes entitlement)

session:
  # Regular trading hours (exchange local time). Bot only trades inside this window.
  market_open: "09:30"
  market_close: "16:00"
  # Stop opening new trades this many minutes before close; flatten everything at flatten_time.
  no_new_trades_after: "15:30"
  flatten_time: "15:55"

signal:
  # NOTE: calibrate these to your trained model's ACTUAL probability spread. 0DTE 5-min
  # direction is near-random, so P(up) is compressed near 0.5 (empirically ~0.38-0.60).
  # A threshold above the model's max => zero trades. Inspect the distribution and retune
  # every time you retrain (see `trainer` output / the prob stats in the README).
  ml_threshold_long: 0.55    # prob(up) required to buy calls (only used when use_ml_gate: true)
  ml_threshold_short: 0.45   # prob(up) below this to buy puts (only used when use_ml_gate: true)
  # LOOSENED 2026-07-07: the directional model has no edge and its output is pinned ~0.46-0.51,
  # so the ml gate blocked ~100% of entries (0-1 trades/day). Selling premium doesn't need a
  # direction forecast — enter on the mechanical rule (RVOL + VWAP side) to actually accumulate
  # the fills/cost evidence. Bounded by max 4 trades/day + 1 concurrent + defined risk. These
  # are noise-quality entries by design (we're testing cost economics, not entry skill).
  use_ml_gate: false         # false = enter on the rule direction, skip the dead ML threshold
  min_rvol: 1.2              # relative-volume gate (kept: basic activity filter)
  vwap_band_pct: 0.001       # 0.1% distance from VWAP for the rule trigger
  require_breakout: false    # dropped with the ml gate so entries fire consistently
  use_regime_filter: true
  volatile_regime_min_prob: 0.58   # in 'volatile' regime demand more conviction

# Defined-risk credit spreads (premium SELLING). Bullish signal -> sell a bull PUT spread;
# bearish -> sell a bear CALL spread. You collect theta instead of paying it.
spread:
  width: 5                   # dollars between short and long strike (max loss = width - credit)
  short_otm_pct: 0.002       # place the short leg this far OTM from spot
  profit_target_frac: 0.5    # close when you've captured this fraction of the credit
  # DIAGNOSTIC-DRIVEN (2026-07-05, AI_REVIEW R7): the 2x premium stop was the single
  # biggest self-inflicted wound — 0DTE gamma noise tripped it constantly, converting
  # recoverable drawdowns into realized losses (removing it: PF 0.56 -> 0.85, win 60% ->
  # 82%, robust across fill models). 999 = hold to profit-target/time/flatten; risk stays
  # DEFINED by construction (max loss = width - credit; sl_cost is capped at width).
  stop_mult: 999.0
  # H6 candidate (R8): stop at a fraction of spread WIDTH instead of a credit multiple
  # (e.g. 0.5 => exit when closing costs $2.50 on a $5 spread). null = disabled; the
  # 180-day three-arm test + holdout decide whether this replaces hold-to-target.
  stop_width_frac: null
  min_credit: 0.20           # skip if the net credit is below this. 0.10 was a near-no-op that
                             # permitted lottery-ticket spreads (tiny credit vs full width risk);
                             # 0.20 floors out the worst reward-to-risk on a cost-dominated book.
  # Spreads need TIME for theta to work — do not inherit the scalper's 10-min time stop.
  max_hold_minutes: 240      # hold up to this long (still flattened before the close)

sentiment:
  enabled: false             # requires requirements-extras.txt (transformers+torch)
  model: ProsusAI/finbert
  bearish_veto: -0.7         # sentiment below this vetoes new longs

model:
  path: models/lightgbm_directional.txt
  meta_path: models/lightgbm_meta.json
  range_path: models/lightgbm_range.txt
  range_meta_path: models/lightgbm_range_meta.json
  breach_dn_path: models/lightgbm_breach_dn.txt
  breach_dn_meta_path: models/lightgbm_breach_dn_meta.json
  breach_up_path: models/lightgbm_breach_up.txt
  breach_up_meta_path: models/lightgbm_breach_up_meta.json
  # H10 shadow cost-quality meta-labeler (trained locally from trades.db once >=100 fills).
  cost_meta_path: models/cost_meta_labeler.txt
  cost_meta_meta_path: models/cost_meta_labeler_meta.json

# Intelligence layer for spread entries/exits. Every feature is fail-safe: missing model,
# missing quotes, or empty calendar => the previous static behavior.
#
# DEFAULTS ARE EVIDENCE-BASED (90-day walk-forward OOS decomposition, 2026-07-05):
#   baseline PF 0.94 | +range strikes 0.84 | +defense exit 0.50 | both 0.77
# => use_range_strikes and defense_enabled ship OFF; they degraded expectancy in the test
# window (smaller credits / whipsaw near static strikes). They remain implemented + tested
# for event days and high-vol regimes. Liquidity gate, quote-mid pricing, and the event
# guard are ON: they only avoid costs, never add risk. See docs/AI_REVIEW.md.
intelligence:
  use_range_strikes: false     # place short strike beyond forecast range x safety (OOS: hurts in calm regimes)
  defense_enabled: false       # close when spot nears the short strike (OOS: whipsaws near static strikes)
  # EV (premium-richness) gate: sell only when credit x [pt(1-p) - (stop-1)p] >= min_ev,
  # p = nightly-trained P(spot reaches the short strike within the horizon).
  # OOS verdict (90d): gate kept the WORSE half of trades (PF 0.70 vs 0.94) — the breach
  # probabilities don't rank trade quality on this window. Ships OFF. docs/AI_REVIEW.md.
  use_ev_gate: false
  min_ev: 0.0                  # require EV >= this (dollars of premium, per share)
  breach_horizon_bars: 120     # breach-label lookahead (minutes)
  # Exit fill improvement: non-urgent closes (profit target / time stop) go LIMIT at the
  # current mid; escalate to market if unfilled. Stops/defense/flatten are always market.
  limit_exits: true
  limit_exit_escalate_s: 120   # unfilled limit close escalates to market after this many seconds
  # Opening-gap guard: if |today's open - prior close| >= this, no new entries all session
  # (0DTE never holds overnight; the risk is ENTERING a violent post-gap open).
  gap_guard_pct: 0.01
  # LIVE WIDTH EXPERIMENT (pre-registered as H2b in docs/RESEARCH_PROTOCOL.md):
  # per-entry width chosen by deterministic hash of the entry minute — fresh, unbiased
  # evidence on the structural question ($10 width was PF 1.02 exploratory vs 0.94 at $5).
  width_experiment_enabled: true
  width_arms: [5, 10]
  range_horizon_bars: 60       # forecast window for expected max excursion (minutes)
  range_safety_mult: 1.25      # short strike must sit beyond expected range x this
  max_short_otm_pct: 0.01      # if the safe strike is further than 1% OTM, skip (no edge)
  defense_buffer_pct: 0.001    # close defensively when spot gets within 0.1% of the short strike
  liquidity_max_frac: 0.25     # sum of leg half-spreads must be <= this fraction of credit
  require_quotes: true         # skip entries when leg quotes are unavailable. false let the bot
                               # price off stale last-trade prints AND bypass the liquidity gate
                               # exactly when spreads were least liquid — a guaranteed cost-loser.
  entry_limit_frac: 0.95       # entry limit at this fraction of quote-mid credit (else 0.9 of last)
  events_file: config/events.yaml

execution:
  broker: sim                # sim | ibkr   (CLI --broker overrides)
  mode: paper                # paper | live (CLI --mode overrides)
  live_confirmed: false      # MUST be true AND --mode live to send real-money orders
  poll_seconds: 30           # live loop cadence
  # KILL SWITCH for new positions. false => the bot still starts, connects, sweeps unmanaged
  # positions, manages/flattens anything open, reconciles and publishes — but opens NOTHING.
  # Deliberately NOT max_trades_per_day: that is a risk limit the tests assert on, and zeroing
  # it fails the runner's pytest gate, which then reverts to the previous commit and trades
  # with the OLD code. This flag is read only by the live entry gate.
  #
  # Set false on 2026-07-10: the order-lifecycle rewrite has never executed live, Thursday's
  # breach assigned into short stock that isn't confirmed cleared, and exits can still be priced
  # off delayed quotes (reqMarketDataType(3)) while the stale-data HALT is dead-wired — the
  # exact defect that let that breach go unmanaged. RESTORE TO true once those are fixed.
  entries_enabled: false
  ibkr:
    host: "127.0.0.1"
    # IB GATEWAY ports (installed on this machine): paper=4002, live=4001.
    # (TWS would be 7497/7496.) The loop picks paper_port/live_port by --mode.
    paper_port: 4002
    live_port: 4001
    client_id: 17
    exchange: SMART
    currency: USD
  option:
    dte: 0                   # 0DTE
    strike_offset: 0         # 0 = ATM; +1 = one strike OTM
    contracts_fallback: 1

memory:
  db_path: memory.db
  trade_log_path: trades.db   # per-trade decision context + fills (training data for deferred ideas)
  time_gate_minutes: 3       # min gap between decisions on same symbol
  max_bias_changes_per_hour: 2

alerts:
  telegram_enabled: false

logging:
  level: INFO
  dir: logs
