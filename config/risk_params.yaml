# Risk parameters. These are the guardrails. Start conservative; loosen only after evidence.

account:
  starting_equity: 10000     # used by SimBroker for paper trading

per_trade:
  risk_pct: 0.02             # fraction of equity risked per trade (max loss to SL)
  max_contracts: 5           # hard cap regardless of sizing math
  min_contracts: 1

targets:
  # Stops/targets are computed on the REAL option premium (no Black-Scholes, no delta mapping).
  risk_reward_ratio: 1.5     # TP distance = RR * SL distance
  sl_atr_mult: 1.0           # SL distance = mult * ATR of the option's own recent bars
  option_atr_bars: 10        # how many of the option's minute bars to measure ATR over
  sl_min_frac: 0.20          # floor: stop at least this fraction of entry premium away
  sl_max_frac: 0.60          # cap: never risk more than this fraction of entry premium

commissions:
  per_contract: 0.65         # both legs charged; matches typical IBKR options commission
  slippage_frac: 0.02        # fraction of premium given up per side (crossing the spread)

limits:
  max_trades_per_day: 4
  max_daily_loss_pct: 0.02   # halt for the day if realized+open PnL <= -2% of equity
  max_concurrent_positions: 1
  time_stop_minutes: 10      # force-close any position after this many minutes
  # Faster brake than the 20-trade self-corrector window: after this many CONSECUTIVE
  # losses (across days), pause new entries until a manual restart or the next session.
  # Risk-reducing only; a win resets the counter.
  max_consecutive_losses: 6

anomaly:
  price_sigma: 3.0           # |z| of 1m return that triggers a price shock
  iv_spike_mult: 2.0         # IV jump vs rolling mean that triggers an IV shock
  max_exec_latency_ms: 2000
  max_data_staleness_s: 120
